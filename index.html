<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homemade Chicken Pickles</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff7f2;
}

header {
    background: #b22222;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.product {
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
}

.price {
    font-size: 20px;
    font-weight: bold;
    color: #b22222;
    margin: 10px 0;
}

button {
    background: #b22222;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #8b0000;
}

footer {
    text-align: center;
    background: #b22222;
    color: white;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <h1>🔥 Homemade Chicken Pickles</h1>
    <p>Fresh | Spicy | Traditional Taste</p>
</header>

<div class="container">

    <!-- PRODUCT 1 -->
    <div class="product">
        <img src="images/classic.jpg" alt="Classic Chicken Pickle">
        <h2>Classic Chicken Pickle</h2>
        <p class="price">₹499 / 500g</p>
        <button onclick="orderNow('Classic Chicken Pickle')">Buy Now</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product">
        <img src="images/spicy.jpg" alt="Spicy Chicken Pickle">
        <h2>Spicy Chicken Pickle</h2>
        <p class="price">₹549 / 500g</p>
        <button onclick="orderNow('Spicy Chicken Pickle')">Buy Now</button>
    </div>

    <!-- PRODUCT 3 -->
    <div class="product">
        <img src="images/garlic.jpg" alt="Garlic Chicken Pickle">
        <h2>Garlic Chicken Pickle</h2>
        <p class="price">₹599 / 500g</p>
        <button onclick="orderNow('Garlic Chicken Pickle')">Buy Now</button>
    </div>

</div>

<footer>
    © 2026 Homemade Chicken Pickles | Contact: +91 9876543210
</footer>

<script>
function orderNow(productName) {
    let phoneNumber = "919876543210"; // Change to your WhatsApp number
    let message = "Hello, I want to order " + productName;
    let url = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}
</script>

</body>
</html>
